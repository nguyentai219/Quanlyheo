<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Heo</title>
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Quản Lý Heo">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1998/1998634.png">

    <style>
        :root { --bg-color: #f0f2f5; --primary-red: #d93025; --header-bg: #fff9e6; --border-color: #eee; --done-bg: #d1e7dd; --overdue-bg: #f8d7da; --warning-bg: #fff9cd; --blue-border: #90caf9; --blue-bg: #e3f2fd; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; padding: 10px; font-size: 17px; line-height: 1.5; }
        .input-box { background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; border: 2px solid #2e7d32; }
        h2 { font-size: 20px; text-align: center; color: #2e7d32; text-transform: uppercase; margin-top: 0; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 17px; display: block; }
        button.add-btn { width: 100%; background: #28a745; color: white; border: none; padding: 16px; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }
        
        .stats-container { margin-bottom: 20px; }
        .stats-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stats-table th { background: #f8f9fa; color: #555; padding: 8px; text-align: center; font-size: 13px; font-weight: normal; border-bottom: 1px solid #ddd; }
        .stats-table td { padding: 10px 5px; text-align: center; font-weight: bold; color: #333; }

        .list-title-container { margin: 25px 0 15px; text-align: center; }
        .list-title-main { font-size: 22px; font-weight: bold; color: #333; display: block; }
        .list-sub-note { font-size: 14px; color: #666; font-style: italic; margin-top: 5px; line-height: 1.3; }
        
        .pig-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 6px 15px rgba(0,0,0,0.15); margin-bottom: 35px; border-width: 2px; border-style: solid; position: relative; }
        
        .sold-stamp-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; display: flex; flex-direction: column; justify-content: space-around; }
        .sold-stamp { text-align: center; font-size: 35px; color: rgba(217, 48, 37, 0.2); font-weight: 900; transform: rotate(-15deg); line-height: 1.1; padding: 10px; }

        .pig-header { padding: 15px; color: white; display: flex; flex-direction: column; z-index: 1; }
        .pig-header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .pig-name-title { font-size: 24px; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        
        .lock-container { margin-top: 10px; padding: 8px; background: rgba(0,0,0,0.2); border: 1px dashed white; border-radius: 6px; text-align: center; cursor: pointer; }
        .lock-status { color: #ffeb3b; font-size: 14px; font-weight: bold; }

        .pig-body { padding: 12px; position: relative; }
        .pig-info-sub { background: #fdfdfe; padding: 12px; border-radius: 8px; border: 1px dashed #bbb; margin-bottom: 15px; font-size: 17px; }
        .clickable-date { color: #0d47a1; font-weight: bold; text-decoration: underline; cursor: pointer; }
        .edit-birth-text { color: #0d47a1; font-weight: bold; text-decoration: underline; cursor: pointer; font-size: 15px; display: inline-block; margin-top: 12px; padding: 5px 0; }
        .hidden-date-input { visibility: hidden; position: absolute; width: 0; height: 0; }
        .blue-box-style { background: var(--blue-bg); padding: 12px; border-radius: 10px; border: 1px solid var(--blue-border); margin-bottom: 15px; }
        .table-container { margin-bottom: 5px; border-radius: 8px; overflow: hidden; border: 1px solid #90caf9; }
        
        .table-header-flex { display: flex; flex-wrap: wrap; align-items: baseline; padding: 10px; gap: 5px; }
        .table-label { font-weight: bold; font-size: 17px; color: #1565c0; }
        .instruction-note { font-size: 13px; color: #d84315; font-style: italic; }
        
        table { width: 100%; border-collapse: collapse; font-size: 16px; table-layout: fixed; background: white; }
        th { background: #eee; text-align: left; padding: 12px 6px; border-bottom: 2px solid #ddd; }
        td { padding: 14px 6px; border-bottom: 1px solid var(--border-color); line-height: 1.4; }
        .done { background-color: var(--done-bg) !important; text-decoration: line-through; color: #666; }
        .overdue { background-color: var(--overdue-bg) !important; }
        .warning-3days { background-color: var(--warning-bg) !important; font-weight: bold; }
        .exp-title { font-weight: bold; color: #1565c0; font-size: 17px; display: block; margin-bottom: 4px; }
        .exp-total { font-weight: bold; color: #d93025; font-size: 18px; display: block; margin-bottom: 8px; border-bottom: 1px dashed #ddd; padding-bottom: 5px; }
        .edited-row { background-color: #fff9c4 !important; }
        .add-exp-btn { width: 100%; padding: 14px; background: white; border: 2px solid #1565c0; border-radius: 8px; color: #1565c0; font-weight: bold; margin-top: 10px; font-size: 16px; }
        .sell-result { font-size: 17px; line-height: 1.7; background: white; padding: 12px; border-radius: 8px; border: 1px solid #bbdefb; margin-top: 5px; }
        .profit { color: #2e7d32; font-weight: bold; font-size: 18px; }
        .loss { color: #d32f2f; font-weight: bold; font-size: 18px; }
        .sell-btn { width: 100%; padding: 15px; background: #1565c0; color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; font-size: 17px; }
        .del-btn { background: #f5f5f5; color: #999; border: none; padding: 12px; font-size: 14px; width: 100%; margin-top: 15px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; }
        .countdown { color: #d93025; font-weight: bold; font-size: 15px; margin-left: 10px; background: #fff5f5; padding: 2px 6px; border-radius: 4px; border: 1px solid #ffcdd2; }
    </style>
</head>
<body>
    <div class="input-box">
        <h2>🐷 THÊM HEO MỚI</h2>
        <input type="text" id="pigName" placeholder="Tên hoặc Số tai (Bắt buộc)">
        <label style="font-weight:bold; font-size:16px">Ngày phối giống:</label>
        <input type="date" id="breedDate">
        <button class="add-btn" onclick="addPig()">+ TẠO LỊCH QUẢN LÝ</button>
    </div>

    <div class="list-title-container">
        <span class="list-title-main">DANH SÁCH HEO ĐANG NUÔI</span>
        <div class="list-sub-note">Heo gần đẻ nhất hiển thị trên cùng.</div>
        <div id="statsSection" style="margin-top:15px;"></div>
    </div>

    <div id="pigList"></div>

    <div id="expModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Thêm khoản chi</h3>
            <label style="font-size: 16px; font-weight: bold;">Ngày chi:</label>
            <input type="date" id="expDate">
            <input type="text" id="expDesc" placeholder="Khoản chi (VD: Cám hỗn hợp)" onkeydown="handleEnter(event, 'expAmount')">
            <input type="text" id="expAmount" placeholder="Số tiền (đ)" oninput="formatCurrencyInput(this)" onkeydown="handleEnter(event, 'SAVE_EXP')">
            <button class="add-btn" onclick="confirmExpense()">LƯU CHI PHÍ</button>
            <button style="width:100%; margin-top:10px; padding:15px; border:none; border-radius:8px; background:#ddd; font-size:17px;" onclick="closeModal()">HUỶ</button>
        </div>
    </div>

    <div id="sellModal" class="modal">
        <div class="modal-content">
            <h3>XUẤT CHUỒNG HEO</h3>
            <label style="font-size: 16px; font-weight: bold;">Tổng số tiền bán được (để trống nếu 0đ):</label>
            <input type="text" id="sellAmount" placeholder="Nhập số tiền (đ)" oninput="formatCurrencyInput(this)" onkeydown="handleEnter(event, 'SAVE_SELL')">
            <button class="add-btn" style="background:#1565c0" onclick="confirmSell()">LƯU KẾT QUẢ</button>
            <button style="width:100%; margin-top:10px; padding:15px; border:none; border-radius:8px; background:#ddd; font-size:17px;" onclick="closeModal()">HUỶ</button>
        </div>
    </div>

    <div style="padding: 20px; text-align: center;">
        <button style="width:100%; padding:16px; background:#0277bd; color:white; border:none; border-radius:8px; font-weight:bold; font-size:17px" onclick="exportFile()">SAO LƯU DỮ LIỆU (.JSON)</button>
        <input type="file" id="fileInput" style="display:none" onchange="importFile(event)">
        <button style="width:100%; margin-top:12px; background:#666; color:white; border:none; border-radius:8px; font-weight:bold; padding:16px; font-size:17px;" onclick="document.getElementById('fileInput').click()">KHÔI PHỤC DỮ LIỆU</button>
    </div>

    <script>
        const STORAGE_KEY = 'QUANLYHEO_DATA_FINAL';
        let pigs = [], currentPigId = null, currentExpIndex = null;
        const COLORS = ['#2e7d32', '#1565c0', '#c62828', '#ef6c00', '#6a1b9a', '#00838f', '#4e342e'];
        const M_VACS = [{ n: "Parvo, Dịch tả, Giả dại", m: "3-6t trước", dFB: -28 }, { n: "Vắc xin Dịch tả", m: "Tuần 10 thai", dFB: 70 }, { n: "E.coli (1), LMLM", m: "Tuần 12 thai", dFB: 84 }, { n: "Vắc xin E.coli (2)", m: "Tuần 14 thai", dFB: 98 }, { n: "Tai xanh, Giả dại, LMLM, Parvo", m: "2-4t sau sinh", dFBR: 21 }];
        const B_VACS = [{ n: "Sắt (L1)", m: "1-3 ngày", dFBR: 2 }, { n: "Cầu trùng", m: "3-4 ngày", dFBR: 4 }, { n: "Sắt (2), Suyễn, Tai xanh (1)", m: "10-14 ngày", dFBR: 12 }, { n: "E.coli, Dịch tả, Phó thương hàn", m: "21-28 ngày", dFBR: 25 }, { n: "LMLM, Dịch tả (2), Tai xanh (2)", m: "45-60 ngày", dFBR: 52 }];

        function init() { document.getElementById('breedDate').value = new Date().toISOString().split('T')[0]; loadData(); }
        function loadData() { const data = localStorage.getItem(STORAGE_KEY); if (data) { pigs = JSON.parse(data); render(); } }
        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(pigs)); render(); }
        
        function renderStats() {
            const activePigs = pigs.filter(p => p.sellPrice === null);
            const totalPigs = activePigs.length;
            const totalExp = activePigs.reduce((sum, p) => sum + (p.expenses || []).reduce((s, e) => s + e.amount, 0), 0);
            
            document.getElementById('statsSection').innerHTML = `
                <div class="stats-container">
                    <table class="stats-table">
                        <tr><th>Tổng số heo đang nuôi</th><th>Tổng chi (đang nuôi)</th></tr>
                        <tr><td>${totalPigs}</td><td>${totalExp.toLocaleString()}đ</td></tr>
                    </table>
                </div>
            `;
        }

        function addPig() {
            const nameInput = document.getElementById('pigName');
            const breedDateInput = document.getElementById('breedDate');
            const name = nameInput.value.trim();
            if (!name) return alert("Vui lòng nhập Tên hoặc Số tai!");
            const date = breedDateInput.value;
            if (!date) return alert("Chọn ngày phối!");
            
            const maxId = pigs.length > 0 ? Math.max(...pigs.map(p => p.id)) : 0;
            const newId = maxId + 1;
            const d = new Date(date); d.setDate(d.getDate() + 114);
            pigs.push({ id: newId, name, breedDate: date, dueDate: d.toISOString().split('T')[0], actualBirth: null, breedCount: 1, breedUpdated: false, doneVacs: {}, expenses: [], sellPrice: null, sellDate: null, color: COLORS[newId % COLORS.length] });
            nameInput.value = ""; save();
        }

        function toggleLock(pigId) {
            const pig = pigs.find(p => p.id === pigId);
            if (pig && pig.sellPrice !== null) {
                if (confirm("Mở khóa heo này để chỉnh sửa dữ liệu?")) {
                    pig.sellPrice = null;
                    pig.sellDate = null;
                    save();
                }
            }
        }

        function updateBreedDate(pigId, val) {
            const pig = pigs.find(p => p.id === pigId);
            if (pig && val && confirm("Cập nhật ngày phối mới? Hệ thống sẽ tính lại ngày dự kiến sinh và tăng số lần phối.")) {
                pig.breedDate = val;
                pig.breedCount = (pig.breedCount || 1) + 1;
                pig.breedUpdated = true;
                const d = new Date(val); d.setDate(d.getDate() + 114);
                pig.dueDate = d.toISOString().split('T')[0];
                pig.actualBirth = null;
                save();
            }
        }

        function updateBirthDate(pigId, val) { const pig = pigs.find(p => p.id === pigId); if (pig && val && confirm("Cập nhật ngày sinh thực tế?")) { pig.actualBirth = val; save(); } }
        function toggleVac(pigId, type, name) { 
            const pig = pigs.find(p => p.id === pigId); 
            if (pig.sellPrice !== null) return;
            const key = type + "_" + name; 
            if (confirm(pig.doneVacs[key] ? "Hủy xác nhận tiêm?" : "Xác nhận đã tiêm?")) { pig.doneVacs[key] = !pig.doneVacs[key]; save(); } 
        }
        
        function openExpModal(pigId, expIndex = null) {
            const pig = pigs.find(p => p.id === pigId);
            if (pig.sellPrice !== null) return;
            currentPigId = pigId; currentExpIndex = expIndex;
            if (expIndex !== null) {
                const exp = pig.expenses[expIndex];
                document.getElementById('modalTitle').innerText = "Chỉnh sửa chi phí";
                document.getElementById('expDesc').value = exp.desc;
                document.getElementById('expAmount').value = exp.amount.toLocaleString('vi-VN');
                document.getElementById('expDate').value = exp.date;
            } else {
                document.getElementById('modalTitle').innerText = "Thêm khoản chi";
                document.getElementById('expDesc').value = ""; document.getElementById('expAmount').value = "";
                document.getElementById('expDate').value = new Date().toISOString().split('T')[0];
            }
            document.getElementById('expModal').style.display = 'flex';
            setTimeout(() => document.getElementById('expDesc').focus(), 200);
        }
        
        function confirmExpense() {
            const desc = document.getElementById('expDesc').value;
            const amount = parseInt(document.getElementById('expAmount').value.replace(/\./g, ''));
            const date = document.getElementById('expDate').value;
            if (!desc || isNaN(amount)) return alert("Nhập đủ thông tin!");
            const pig = pigs.find(p => p.id === currentPigId);
            if (currentExpIndex !== null) pig.expenses[currentExpIndex] = { desc, amount, date, edited: true };
            else pig.expenses.push({ desc, amount, date, edited: false });
            save(); closeModal();
        }
        function openSellModal(pigId) { 
            const pig = pigs.find(p => p.id === pigId);
            if (pig.sellPrice !== null) return;
            currentPigId = pigId; 
            document.getElementById('sellAmount').value = ""; 
            document.getElementById('sellModal').style.display = 'flex'; 
            setTimeout(() => document.getElementById('sellAmount').focus(), 200); 
        }
        function confirmSell() { 
            const inputVal = document.getElementById('sellAmount').value.replace(/\./g, '');
            const amount = inputVal === "" ? 0 : parseInt(inputVal);
            
            if (isNaN(amount)) return alert("Vui lòng nhập số hợp lệ!");
            
            if (amount === 0) {
                if (!confirm("Bạn có chắc chắn muốn xác nhận xuất chuồng bầy heo này với giá 0đ không?")) return;
            }
            
            const pig = pigs.find(p => p.id === currentPigId); 
            pig.sellPrice = amount; 
            pig.sellDate = new Date().toISOString().split('T')[0]; 
            save(); 
            closeModal(); 
        }
        function closeModal() { document.getElementById('expModal').style.display = 'none'; document.getElementById('sellModal').style.display = 'none'; }
        function deletePig(id) { if (confirm("Xoá heo này vĩnh viễn?")) { pigs = pigs.filter(p => p.id !== id); save(); } }
        function formatDayMonth(s) { if(!s) return ""; const p = s.split('-'); return `${p[2]}/${p[1]}`; }
        function formatFullDate(s) { if(!s) return ""; const [y,m,d] = s.split('-'); return `${d}/${m}/${y}`; }
        function handleEnter(event, action) { if (event.key === 'Enter') { event.preventDefault(); if (action === 'SAVE_EXP') confirmExpense(); else if (action === 'SAVE_SELL') confirmSell(); else document.getElementById(action).focus(); } }
        function formatCurrencyInput(input) { let val = input.value.replace(/\D/g, ''); input.value = val.replace(/\B(?=(\d{3})+(?!\d))/g, '.'); }
        function formatId(id) { return id.toString().padStart(3, '0'); }

        function render() {
            renderStats();
            const list = document.getElementById('pigList'); list.innerHTML = '';
            const now = new Date(); now.setHours(0,0,0,0);
            
            const sortedPigs = [...pigs].sort((a, b) => {
                if (a.sellPrice !== null && b.sellPrice === null) return 1;
                if (a.sellPrice === null && b.sellPrice !== null) return -1;
                if (a.sellPrice !== null && b.sellPrice !== null) {
                    return new Date(a.sellDate) - new Date(b.sellDate);
                }
                return new Date(a.dueDate) - new Date(b.dueDate);
            });
            
            sortedPigs.forEach(pig => {
                const totalExp = (pig.expenses || []).reduce((s, e) => s + e.amount, 0);
                const cardColor = pig.color || '#333';
                const profit = pig.sellPrice !== null ? pig.sellPrice - totalExp : 0;
                const isSold = pig.sellPrice !== null;
                const stamp = isSold ? `<div class="sold-stamp-container"><div class="sold-stamp">ĐÃ XUẤT<br>CHUỒNG</div><div class="sold-stamp">ĐÃ XUẤT<br>CHUỒNG</div><div class="sold-stamp">ĐÃ XUẤT<br>CHUỒNG</div></div>` : '';
                
                const daysLeft = Math.ceil((new Date(pig.dueDate)-now)/86400000);
                const countdownHTML = (!isSold && !pig.actualBirth) ? `<span class="countdown">${daysLeft > 0 ? 'còn '+daysLeft+' ngày' : 'quá ngày'}</span>` : '';
                
                let birthDiffHTML = '';
                if (pig.actualBirth) {
                    const due = new Date(pig.dueDate);
                    const actual = new Date(pig.actualBirth);
                    const diffDays = Math.round((actual - due) / 86400000);
                    const label = diffDays >= 0 ? "Đẻ muộn: " + diffDays + " ngày" : "Đẻ sớm: " + Math.abs(diffDays) + " ngày";
                    birthDiffHTML = `<div style="color:${diffDays === 0 ? '#2e7d32' : '#d32f2f'}; font-weight:bold; margin-top:5px;">➔ ${label}</div>`;
                }

                list.innerHTML += `
                    <div class="pig-card" id="card-${pig.id}" style="border-color: ${isSold ? '#999' : cardColor}">
                        ${stamp}
                        <div class="pig-header" style="background: ${isSold ? '#999' : cardColor}">
                            <div class="pig-header-top">
                                <div class="pig-name-title">🐷 Heo: ${pig.name}</div>
                                <div style="font-size:13px">ID: ${formatId(pig.id)}</div>
                            </div>
                            ${isSold ? `<div class="lock-container" ondblclick="toggleLock(${pig.id})"><span class="lock-status">Đã Khoá - Nhấp đúp để mở</span></div>` : ''}
                        </div>
                        <div class="pig-body">
                            <div class="pig-info-sub">
                                <div ondblclick="document.getElementById('hiddenBreed_${pig.id}').showPicker()">Phối ngày: <b class="clickable-date">${formatFullDate(pig.breedDate)}</b> ${pig.breedUpdated ? ` <span style="font-size:15px; color:#1565c0; font-weight:bold;">(Đã phối lần: ${pig.breedCount})</span>` : ''}</div>
                                ${!pig.actualBirth ? `<div>Dự kiến sinh: <b style="color:${isSold ? '#666' : cardColor}">${formatFullDate(pig.dueDate)}</b>${countdownHTML}</div>` : ''}
                                ${pig.actualBirth ? `<div style="color:#2e7d32; font-weight:bold; cursor:pointer" ondblclick="document.getElementById('hiddenBirth_${pig.id}').showPicker()">✓ Ngày sinh thực tế: ${formatFullDate(pig.actualBirth)}</div>` : ''}
                                ${birthDiffHTML}
                                ${!isSold && !pig.actualBirth ? `<div class="edit-birth-text" ondblclick="document.getElementById('hiddenBirth_${pig.id}').showPicker()">➔ Nhấp đúp chọn ngày thực tế sinh</div>` : ''}
                                <input type="date" id="hiddenBreed_${pig.id}" class="hidden-date-input" value="${pig.breedDate}" onchange="updateBreedDate(${pig.id}, this.value)">
                                <input type="date" id="hiddenBirth_${pig.id}" class="hidden-date-input" value="${pig.actualBirth || pig.dueDate}" onchange="updateBirthDate(${pig.id}, this.value)">
                            </div>
                            <div class="blue-box-style">
                                <div class="table-container">
                                    <div class="table-header-flex">
                                        <span class="table-label">Lịch tiêm ngừa cho heo mẹ</span>
                                        <span class="instruction-note">(Nhấp 2 lần để xác nhận tiêm/huỷ)</span>
                                    </div>
                                    ${renderTable(pig, M_VACS, true, now, isSold)}
                                </div>
                            </div>
                            <div class="blue-box-style">
                                <div class="table-container">
                                    <div class="table-header-flex">
                                        <span class="table-label">Lịch tiêm ngừa cho heo con</span>
                                        <span class="instruction-note">(Nhấp 2 lần để xác nhận tiêm/huỷ)</span>
                                    </div>
                                    ${renderTable(pig, B_VACS, false, now, isSold)}
                                </div>
                            </div>
                            <div class="blue-box-style">
                                <span class="exp-title">CÁC KHOẢN CHI</span>
                                <span class="exp-total">Tổng Chi: ${totalExp.toLocaleString()}đ</span>
                                <table>
                                    ${pig.expenses.length > 0 ? `<tr><th>Khoản chi</th><th style="width:60px">Ngày</th><th style="width:100px; text-align:right">Tiền</th></tr>` : ''}
                                    ${(pig.expenses || []).map((e, idx) => `<tr class="${e.edited ? 'edited-row' : ''}" ${!isSold ? `ondblclick="openExpModal(${pig.id}, ${idx})"` : ''}><td>${e.desc}</td><td>${formatDayMonth(e.date)}</td><td style="text-align:right">${e.amount.toLocaleString()}đ</td></tr>`).join('')}
                                </table>
                                ${!isSold ? `<button class="add-exp-btn" onclick="openExpModal(${pig.id})">+ Thêm chi phí</button>` : ''}
                            </div>
                            <div class="blue-box-style">
                                <span class="sell-title">XUẤT CHUỒNG</span>
                                ${pig.sellPrice !== null ? `
                                    <div class="sell-result">
                                        <div style="margin-bottom:5px; font-weight:bold; color:#d93025">➔ Đã Xuất Chuồng ngày: ${formatFullDate(pig.sellDate)}</div>
                                        <div>Tổng chi phí: <b>${totalExp.toLocaleString()}đ</b></div>
                                        <div>Tổng tiền bán: <b>${pig.sellPrice.toLocaleString()}đ</b></div>
                                        <div class="${profit >= 0 ? 'profit' : 'loss'}">
                                            ${profit >= 0 ? '➔ Tổng lợi nhuận: ' + profit.toLocaleString() + 'đ' : '➔ Bầy heo này bị Lỗ hết: ' + Math.abs(profit).toLocaleString() + 'đ'}
                                        </div>
                                    </div>
                                ` : '<div style="font-size:15px; color:#666">Chưa cập nhật dữ liệu bán heo.</div>'}
                                ${!isSold ? `<button class="sell-btn" onclick="openSellModal(${pig.id})">XUẤT CHUỒNG</button>` : ''}
                            </div>
                        </div>
                        <button class="del-btn" ondblclick="deletePig(${pig.id})">Nhấp đúp để xoá vĩnh viễn heo này</button>
                    </div>`;
            });
        }

        function renderTable(pig, vacs, isMum, now, isSold) {
            let rows = '';
            vacs.forEach(v => {
                let vDate = new Date(isMum && v.dFB !== undefined ? pig.breedDate : (pig.actualBirth || pig.dueDate));
                if (isMum && v.dFB !== undefined) vDate.setDate(vDate.getDate() + v.dFB);
                else if (v.dFBR !== undefined) vDate.setDate(vDate.getDate() + v.dFBR);
                
                const diff = Math.ceil((vDate - now) / 86400000);
                const isDone = pig.doneVacs[(isMum ? 'M' : 'B') + "_" + v.n];
                
                let alertMsg = "";
                if (!isDone && diff >= 0 && diff <= 3) {
                    alertMsg = diff === 0 ? '<br><span style="color:#d93025; font-size:12px">Hôm nay!</span>' : '<br><span style="color:#d93025; font-size:12px">Còn ' + diff + ' ngày</span>';
                }

                let rowClass = "";
                if (isDone) rowClass = "done";
                else if (diff < 0) rowClass = "overdue";
                else if (diff <= 3) rowClass = "warning-3days";

                rows += `<tr class="${rowClass}" ${!isSold ? `ondblclick="toggleVac(${pig.id}, '${isMum?'M':'B'}', '${v.n}')"` : ''}>
                    <td style="width:45%">${v.n}</td>
                    <td style="width:30%">${formatDayMonth(vDate.toISOString().split('T')[0])}${alertMsg}</td>
                    <td style="width:25%; font-size:14px">${v.m}</td>
                </tr>`;
            });
            return `<table>${rows}</table>`;
        }

        function exportFile() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(pigs)], { type: "application/json" })); a.download = `DuLieuHeo.json`; a.click(); }
        function importFile(e) { const reader = new FileReader(); reader.onload = (ev) => { pigs = JSON.parse(ev.target.result); save(); location.reload(); }; reader.readAsText(e.target.files[0]); }
        window.onload = init;
    </script>
</body>
</html>
